name: Frontend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'package.json'
      - 'vite.config.ts'
      - 'vitest.config.ts'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [main]

jobs:
  test:
    name: Vitest + ESLint + Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Run unit tests
        run: npm run test -- --reporter=verbose --coverage
        env:
          CI: true
          VITE_API_BASE_URL: https://sourceiq-backend.hf.space

      - name: Build (type-check + bundle)
        run: npm run build
        env:
          VITE_API_BASE_URL: https://sourceiq-backend.hf.space

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: coverage/
          retention-days: 7
